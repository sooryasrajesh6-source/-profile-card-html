<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile Card</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #74ebd5, #9face6);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      width: 320px;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    .card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      color: #333;
      margin-bottom: 5px;
    }

    p {
      color: #555;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #6c63ff;
      color: white;
      text-decoration: none;
      border-radius: 25px;
    }

    a:hover {
      background: #5148d9;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="https://via.placeholder.com/120" alt="Profile Image">
    <h1>Soorya S Rajesh</h1>
    <p>Computer Science Engineering Student learning HTML, CSS, JavaScript, React, Java, and Python.</p>
    <a href="https://github.com/sooryasrajesh6-source" target="_blank">Visit GitHub</a>
  </div>

</body>
</html>
